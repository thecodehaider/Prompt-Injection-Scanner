name: "🐛 Bug Report"
description: "Report a bug or unexpected behavior in the scanner"
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below.
        For **security vulnerabilities**, use our private disclosure process in [SECURITY.md](../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: "Describe the bug"
      description: "A clear description of what went wrong."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      description: "What did you do to trigger this?"
      placeholder: |
        1. Go to https://quantizelab.dev/tools/prompt-scanner
        2. Paste prompt: "..."
        3. Click INITIALIZE_SCAN
        4. See error: "..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true

  - type: input
    id: plan
    attributes:
      label: "Plan tier (Free / Pro / Team)"
    validations:
      required: false
